<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator
    </title>
    <link rel="shortcut icon" type="image/x-icon" href="./title-icon.png" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="Calculator">
        <input type="text" placeholder="0" id="output" readonly>
        <div>
        <button onclick="allclear()">AC</button>
        <button onclick="del()">Del</button>
        <button class=" btn">&#40;</button>
        <button class="btn">&#41;</button>
        </div>
        <div>
        <button onclick="log()">log</button>
        <button onclick="exp()">e</button>
        <button onclick="pi()"> &#960;</button>
        <button class="btn" onclick="percentage()">%</button>
        </div>
        <div>
            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>
            <button class="btn">/</button>  
        </div>
        <div>
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn">x</button>
        </div>
        <div>
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn">-</button>
        </div>
        <div>
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn">+</button>
        </div>
        <div>
            <button class="btn">00</button>
            <button class="btn">0</button>
            <button class="btn">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>


    </div><!--end calculator-->
    <script src="script.js"></script>
</body>

</html>
