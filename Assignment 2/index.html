<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <style>
        {text-align=left
        left-margin}
        label{
            width: 200px;
            display: inline-block;
            text-align: left;
        }
    </style>
    <form style="display:inline-block; margin:0 auto;">

    <label for="fname">First Name:</label>
    <input type="text" id="fname" name="fname" value="Enter your first name"> 
    <br>

    <label for="lname">First Name:</label>
    <input type="text" id="lname" name="lname" value="Enter your last name">
    <br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="It should contain @">
    <br>

    
    <label for="Mobile">Email:</label>
    <input type="number" id="Mobile" name="Mobile" value="Only 10 digits are allowed">
    <br>

    
    <label for="Gender"> Gender</label>  
    <input type="radio" id="Male" name="Gender" value="Male">
    <label for="Male">Male </label>
    

    <input type="radio" id="Female" name="Gender" value="Female>">
    <label for="Female">Female </label>
    <br>
    
    <label for="Date of Birth"> Date of Birth:</label>
    <input type="date" id="Date of Birth" name="Date of Birth" value=" mm/dd/yyyy">
    <br>
    
    <label for="Address">Address:</label>
    <textarea id="Address" name="Address" rows="4" cols="50"></textarea>
    <br>

    <label for="City">City:</label>
    <Input type="text" id="City" name="City" value="">
    <br>

    <label for="Area Pin">Area Pin:</label>
    <Input type="text" id="Area Pin" name="Area Pin" value="">
    <br>

    <label for="State">State:</label>
    <Input type="text" id="State" name="State" value="">
    <br>
    
    <label for="Qualification">Select Qualification:</label>
    <select id="Qualification" name="Qualification">
        <option value="Matric"> Matric</option>
        <option value="ٖIntermediate"> ٖIntermediate</option>
        <option value="Graducation"> Graducation</option>
        <option value="Master"> Master</option>
        <br>
        
    <p>Specialization:</p>

        
        <label for="computer science">computer science</label>
        <input type="checkbox" id="computer science" name="computer science" value="computer science">
        <br>

        <label for="Information Technology">Information Technology</label>
        <input type="checkbox" id="Information Technology" name="Information Technology" value="Information Technology">
        <br>

        <label for="Computer Architecture">Computer Architecture</label>
        <input type="checkbox" id="Computer Architecture" name="Computer Architecture" value="Computer Architecture">
            <br>
        <label for="Tele Communication">Tele Communication</label>
        <input type="checkbox" id="Tele Communication" name="Tele Communication" value="Tele Communication">
            <br>

        <label for="Password">Password:</label>
        <input type="password" id="password" name="password" value="">
            <br>
        
        <button>Registered</button>

    </div>
        
                
                
                
                
        
        
        
        
        
        
        
        
        
        
        
        


    </form>
</body>
</html>
