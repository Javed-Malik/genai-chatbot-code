<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>
        form {padding-left:  30px;}
        
        label{
            width: 200px;
            margin-top: 10px;
            display: inline-block;
            color: black;
            
        }
        input{
            border-color: black;
        }
        h2{ 
            text-align: center;

            font-size:xx-large;
            color: red;        }

<body>
    <h2> Student Registration Form</h2>
    <h3> <a href="./table.html">Table</a></h3>
<form > 
        <fieldset style="background-color: rgb(89, 150, 150);">
    <label for="fname">First Name:</label>
    <input type="text" id="fname" name="fname" value="Enter your first name" size=55px"> 
    <br>

    <label for="lname">First Name:</label>
    <input type="text" id="lname" name="lname" value="Enter your last name" size=55px">
    <br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="It should contain @" size=55px">
    <br>

    
    <label for="Mobile">Email:</label>
    <input type="number" id="Mobile" name="Mobile" value="Only 10 digits are allowed" size=55px">
    <br>

    Gender
    <input type="radio" id="male" name="Gender" value="Male">Male
    <input type="radio" id="female" name="Gender" value="Male">Female
    
    <br>
    
    <label for="Date of Birth"> Date of Birth:</label>
    <input type="date" id="Date of Birth" name="Date of Birth" value=" mm/dd/yyyy"size=55px">
    <br>
    <br>
    <label for="Address">Address:</label>
    <textarea id="Address" name="Address" rows="4" cols="52"></textarea>
    <br>

    <label for="City">City:</label>
    <Input type="text" id="City" name="City" value=""size=55px">
    <br>

    <label for="Area Pin">Area Pin:</label>
    <Input type="text" id="Area Pin" name="Area Pin" value="" size=55px">
    <br>

    <label for="State">State:</label>
    <Input type="text" id="State" name="State" value="" size=55px">
    <br>
    
    <label for="Qualification">Select Qualification:</label>
    <select id="Qualification" name="Qualification"> 
        <option value="Matric"> Matric</option>
        <option value="ٖIntermediate"> ٖIntermediate</option>
        <option value="Graducation"> Graducation</option>
        <option value="Master"> Master</option>
        <br>
        <br>
        
        <label for="Specialization">Specialization:</label>
        <br>

      
    <input type="checkbox" id="computer science" name="computer science" value="computer science">computer Science
        <br>

        <input type="checkbox" id="Information Technology" name="Information Technology" value="Information Technology">Information Technology
        <br>

        <input type="checkbox" id="Computer Architecture" name="Computer Architecture" value="Computer Architecture">Computer Architecture
            <br>
            <input type="checkbox" id="Tele Communication" name="Tele Communication" value="Tele Communication">Tele Communication
            <br>
            <label for="Password">Password:</label>
            <input type="password" id="password" name="password" value="" size="55px">
            <br>
            <br>
        
        <button style="background-color:green;">Registered</button>
